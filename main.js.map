<section class="file-picker">
  <section class="file-picker-content">
    <section *ngFor="let file of files" class="media" [file]="file" filePreview>
      <section class="close-btn" (click)="removeFile(file)">
        <i nz-icon nzType="close" nzTheme="outline"></i>
      </section>
    </section>
    <section class="add-file" (click)="clickAdd()">
      <section class="border">
        <i nz-icon nzType="plus" nzTheme="outline"></i>
      </section>
    </section>
  </section>

  <input
    type="file"
    style="display: none"
    class="file-input"
    [accept]="'*'"
    [multiple]="true"
    (change)="fileChange($event)"
  />
</section>
