<section>
  <section class="img-video-container">
    <div *ngFor="let img of imgs" class="media" (dblclick)="img.remove()">
      <img
        src="./朱茵.jpg"
        filePreview
        [file]="img?._file"
        style="width: 200px; height: 200px"
      />
    </div>

    <div *ngFor="let video of videos" class="media" (dblclick)="video.remove()">
      <video
        controls
        filePreview
        src=""
        style="width: 200px; height: 200px"
        [file]="video?._file"
      ></video>
    </div>
    <div
      *ngIf="imgs.length + videos.length < 5"
      class="add-file"
      (click)="upload()"
    >
      Upload
    </div>
  </section>
  <input
    type="file"
    ng2FileSelect
    accept="image/*, video/*"
    name="Upload"
    class="input-upload"
    multiple
    [uploader]="uploader"
    style="display: none"
  />
</section>
